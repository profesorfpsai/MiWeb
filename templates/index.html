<!DOCTYPE html>
<html>
<head>
  <title>Mi Web</title>
</head>
<body>

<h1>Clientes NUEVO</h1>

<div id="clientes"></div>

<script>
fetch("/clientes")
  .then(res => res.json())
  .then(data => {
    const cont = document.getElementById("clientes");

    data.forEach(c => {
      cont.innerHTML += `
        <div style="border:1px solid #ccc; margin:10px; padding:10px;">
          <h3>${c.nombre}</h3>
          <p>${c.email}</p>
          <p>${c.telefono}</p>
        </div>
      `;
    });
  });
</script>

</body>
</html>
